name: Poll Email & Process Links

on:
  schedule:
    # Every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub UI

permissions:
  contents: read

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          # Enterprise API only (not needed for notebooklm-py):
          # pip install google-auth

      - name: Run email processor
        env:
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_IMAP_HOST: ${{ secrets.EMAIL_IMAP_HOST }}
          EMAIL_IMAP_PORT: ${{ secrets.EMAIL_IMAP_PORT }}
          EMAIL_IMAP_SEND_CLIENT_ID: ${{ secrets.EMAIL_IMAP_SEND_CLIENT_ID }}
          EMAIL_SMTP_HOST: ${{ secrets.EMAIL_SMTP_HOST }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          EMAIL_SMTP_USE_TLS: ${{ secrets.EMAIL_SMTP_USE_TLS }}
          AUTH_ALLOWED_SENDERS: ${{ secrets.AUTH_ALLOWED_SENDERS }}
          NOTEBOOKLM_AUTH_JSON: ${{ secrets.NOTEBOOKLM_AUTH_JSON }}
          NOTEBOOKLM_INTEGRATION: ${{ secrets.NOTEBOOKLM_INTEGRATION }}
          GCP_PROJECT_NUMBER: ${{ secrets.GCP_PROJECT_NUMBER }}
          GCP_CREDENTIALS_JSON: ${{ secrets.GCP_CREDENTIALS_JSON }}
        run: python -m src.main config/config.example.yaml
